name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt ruff pytest pytest-asyncio
      - run: ruff check src/ tests/
      - name: Run tests
        env:
          GOOGLE_API_KEY: "dummy-key-for-ci"
        run: pytest tests/ -v --tb=short
